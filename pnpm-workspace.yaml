packages:
  - "packages/*"
  - "packages/foundation/*"
  - "packages/adapter/*"
  - "packages/storage/*"
  - "packages/plugins/*"
  - "packages/plugins/policies/*"
  - "packages/engines/*"

# better-sqlite3 needs its native build to run (only this one is allowlisted) — used by the
# SQL storage adapters' tests via an in-memory database.
allowBuilds:
  better-sqlite3: true
  mongodb-memory-server: true
  prisma: true
  "@prisma/client": true
  "@prisma/engines": true
  msw: false
onlyBuiltDependencies:
  - better-sqlite3
  - mongodb-memory-server
  - prisma
  - "@prisma/client"
  - "@prisma/engines"
# Explicitly ignored build scripts (not needed to run): a fresh install otherwise fails pnpm's
# verify-deps-before-run check with ERR_PNPM_IGNORED_BUILDS.
ignoredBuiltDependencies:
  - msw
